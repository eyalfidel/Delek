<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- הגדרה קריטית למובייל ולאייפון בפרט: מונעת זום רנדומלי ומתאימה את התצוגה למסך -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מעקב דלק - בבנייה</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #374151;
        }
        .container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 85%;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #1f2937;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">⛽🚧🚗</div>
        <h1>מעקב הדלק שלכן בבנייה!</h1>
        <p>המערכת מתחממת...<br>בקרוב תוכלו להתחיל לעקוב מי נסעה, כמה, ולמי היא חייבת כסף 😅</p>
    </div>
</body>
</html>
